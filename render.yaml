services:
  - type: web
    name: gradejournal
    runtime: node
    repo: https://github.com/yourusername/gradejournal
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://gradejournal.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false